<main class="app-menu min-h-screen font-sans flex flex-col items-center p-4 relative bg-[#1e1f22] text-[#dbdee1]">

    <div class="w-full flex justify-between items-center mb-8 bg-[#2b2d31] border border-white/[0.06] rounded-xl px-3 py-2 shadow-md">

            </div>

        <div class="flex items-center gap-2">

            </div>

            <div class="relative">

                    </button>
                </div>
                <ul class="menu bg-base-200 rounded-box w-36 mt-0.5 absolute">
                    <li>
                        <a>
<img src="./assets/icon-flag-usa.svg" alt="" class="h-5 w-5">
                        English
                        </a>
                    </li>
                    <li>
                        <a>
<img src="./assets/icon-flag-rs.svg" alt="" class="h-5 w-5">

                        Srpski
                        </a>
                    </li>
                </ul>
            </div>

            <div class="tooltip tooltip-bottom" data-tip="Settings">
                <button class="btn btn-circle">
                    <img src="./assets/icon-theme-dark.svg" class="h-5 w-5" />

            <div class="tooltip tooltip-bottom" data-tip="Settings">
                <button class="btn btn-circle">
                    <img src="./assets/icon-settings.svg" class="h-5 w-5" />
                </button>
            </div>
        </div>

    <div class="flex flex-col items-center mb-8 gap-3">

        <span class="inline-flex items-center gap-1.5 px-3 py-0.5 rounded-full bg-white/[0.08] text-[#80848e] text-[11px] font-semibold uppercase tracking-wider">
            <span class="w-1.5 h-1.5 rounded-full bg-[#23a55a] inline-block"></span>
            Online · Spreman za igru
        </span>
    </div>

    <button id="randomGame" class="menu-button w-full max-w-md bg-[#5865f2] hover:bg-[#4752c4] active:bg-[#3c45a5] rounded-lg px-5 py-3.5 flex items-center justify-start gap-4 shadow-[0_4px_14px_rgba(88,101,242,0.35)] hover:shadow-[0_6px_20px_rgba(88,101,242,0.5)] hover:-translate-y-px active:translate-y-0 transition-all mb-5 group relative overflow-hidden border-0">
        <div class="absolute inset-0 bg-gradient-to-br from-white/10 to-transparent pointer-events-none"></div>
        <div class="w-11 h-11 rounded-full bg-white/15 group-hover:bg-white/20 group-hover:scale-105 transition-all flex items-center justify-center flex-shrink-0">
            <img src="./assets/icon-play.svg" class="w-5 h-5" />
        </div>
        <div class="text-left">
            <span class="block text-base font-bold text-white">Započni Igru</span>
            <span class="block text-xs text-white/70 font-medium mt-0.5">Single Player režim</span>
        </div>

    <div class="flex flex-col md:flex-row gap-2 w-full max-w-md justify-center mb-12">

        <div class="bg-[#2b2d31] border border-white/[0.06] rounded-lg p-5 flex-1 flex flex-col items-stretch gap-3 shadow-md hover:border-[#5865f2]/40 hover:shadow-lg transition-all">

                <div class="w-8 h-8 rounded flex items-center justify-center bg-white/[0.08] text-[#5865f2] flex-shrink-0">
                    <img src="./assets/icon-hash.svg" class="w-4 h-4" />
                </div>
                <span class="font-bold text-sm text-[#dbdee1]">Napravi Sobu</span>
            </div>
            <div class="h-px bg-white/[0.06] -mx-5"></div>

        </div>

        <div class="bg-[#2b2d31] border border-white/[0.06] rounded-lg p-5 flex-1 flex flex-col items-stretch gap-3 shadow-md hover:border-[#5865f2]/40 hover:shadow-lg transition-all">

            </div>
            <div class="h-px bg-white/[0.06] -mx-5"></div>
            <input type="text" id="gameId" placeholder="Unesi kod..." class="menu-input w-full bg-[#1e1f22] border border-[#4e5058] focus:border-[#5865f2] rounded text-sm font-medium text-[#dbdee1] placeholder-[#80848e] py-2.5 px-3 text-center focus:outline-none transition-colors tracking-widest uppercase">
            <button id="joinGame" class="menu-button w-full py-2.5 px-4 rounded text-sm font-semibold bg-[#23a55a] hover:bg-[#1a8046] active:bg-[#158040] text-white hover:-translate-y-px active:translate-y-0 transition-all border-0">Uđi</button>
        </div>

    </div>

    <p class="trade-mark absolute bottom-4 text-xs opacity-40 font-bold uppercase tracking-widest text-[#80848e]">
        2025 copyright &copy; Slagalica
