<main class="app-menu min-h-screen font-sans flex flex-col items-center p-4 relative bg-surface text-content">

    <div class="w-full flex justify-between items-center mb-8 bg-surface-raised border border-white/[0.06] rounded-xl px-3 py-2 shadow-md">
        <div class="flex items-center gap-2">
            <div class="relative">
                <div class="avatar avatar-online avatar-placeholder">
            <div class="bg-neutral text-neutral-content w-12 rounded-full">
                <span class="text-xl">JE</span>
            </div>
            </div>
            </div>
            <input type="text" class="username-inp bg-transparent border-none focus:outline-none font-semibold text-content placeholder-content-muted text-sm w-28" id="usernameInp" placeholder="Igrac123">
        </div>


        <div class="flex items-center gap-2" id="headerActions">

            <div class="relative">
                <div class="tooltip tooltip-left" data-tip="Language">
                    <button class="btn btn-circle" id="languagePicker">
                        <img src="./assets/icon-lang.svg" class="h-5 w-5" />
                    </button>
                </div>
                <ul class="menu bg-base-200 rounded-box w-36 mt-0.5 absolute hidden" id="languagePickerMenu">
                    <li>
                        <a data-lang="english">
<img src="./assets/icon-flag-usa.svg" alt="" class="h-5 w-5">
                        English
                        </a>
                    </li>
                    <li>
                        <a data-lang="serbian">
<img src="./assets/icon-flag-rs.svg" alt="" class="h-5 w-5">

                        Srpski
                        </a>
                    </li>
                </ul>
            </div>

            <div class="tooltip tooltip-bottom" data-tip="Sound">
                <button class="btn btn-circle">
                    <img src="./assets/icon-sound-off.svg" class="h-5 w-5" />
                </button>
            </div>


            <div class="tooltip tooltip-bottom" data-tip="Theme">
                <button class="btn btn-circle" id="themeToggleBtn">
                    <img src="./assets/icon-theme-dark.svg" class="h-5 w-5" />
                </button>
            </div>
<!-- 
            <div class="tooltip tooltip-bottom" data-tip="Settings">
                <button class="btn btn-circle">
                    <img src="./assets/icon-settings.svg" class="h-5 w-5" />
                </button>
            </div> -->
        </div>
    </div>

    <div class="flex flex-col items-center mb-8 gap-3">
        <img src="./assets/owl_logo.png" class="logo-img w-20 h-20 drop-shadow-brand mb-1" />
        <h3 class="text-2xl font-black tracking-[.18em] uppercase text-content">SLAGALICA</h3>
        <span class="inline-flex items-center gap-1.5 px-3 py-0.5 rounded-full bg-white/[0.08] text-content-muted text-[11px] font-semibold uppercase tracking-wider">
            <span class="w-1.5 h-1.5 rounded-full bg-positive inline-block"></span>
            Online · Spreman za igru
        </span>
    </div>

    <button id="randomGame" class="menu-button w-full max-w-md bg-brand hover:bg-brand-hover active:bg-brand-active rounded-lg px-5 py-3.5 flex items-center justify-start gap-4 shadow-brand-md hover:shadow-brand-lg hover:-translate-y-px active:translate-y-0 transition-all mb-5 group relative overflow-hidden border-0">
        <div class="absolute inset-0 bg-gradient-to-br from-white/10 to-transparent pointer-events-none"></div>
        <div class="w-11 h-11 rounded-full bg-white/15 group-hover:bg-white/20 group-hover:scale-105 transition-all flex items-center justify-center flex-shrink-0">
            <img src="./assets/icon-play.svg" class="w-5 h-5" />
        </div>
        <div class="text-left">
            <span class="block text-base font-bold text-white">Započni Igru</span>
            <span class="block text-xs text-white/70 font-medium mt-0.5">Multi Player režim</span>
        </div>
    </button>

    <button id="singlePlayer" class="menu-button w-full max-w-md bg-brand-secondary hover:bg-brand-secondary-hover active:bg-brand-secondary-active rounded-lg px-5 py-3.5 flex items-center justify-start gap-4 shadow-brand-secondary-md hover:shadow-brand-secondary-lg hover:-translate-y-px active:translate-y-0 transition-all mb-5 group relative overflow-hidden border-0">
        <div class="absolute inset-0 bg-gradient-to-br from-white/10 to-transparent pointer-events-none"></div>
        <div class="w-11 h-11 rounded-full bg-white/15 group-hover:bg-white/20 group-hover:scale-105 transition-all flex items-center justify-center flex-shrink-0">
            <img src="./assets/icon-singleplayer.svg" class="w-5 h-5" />
        </div>
        <div class="text-left">
            <span class="block text-base font-bold text-white">Trening</span>
            <span class="block text-xs text-white/70 font-medium mt-0.5">Single Player režim</span>
        </div>
    </button>

    <div class="flex flex-col md:flex-row gap-2 w-full max-w-md justify-center mb-12">

        <div class="bg-surface-raised border border-white/[0.06] rounded-lg p-5 flex-1 flex flex-col items-stretch gap-3 shadow-md hover:border-brand/40 hover:shadow-lg transition-all">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded flex items-center justify-center bg-white/[0.08] text-brand flex-shrink-0">
                    <img src="./assets/icon-hash.svg" class="w-4 h-4" />
                </div>
                <span class="font-bold text-sm text-content">Napravi Sobu</span>
            </div>
            <div class="h-px bg-white/[0.06] -mx-5"></div>
            <button id="createGameBtn" class="menu-button w-full py-2.5 px-4 rounded text-sm font-semibold border border-brand text-brand hover:bg-brand hover:text-white active:bg-brand-active hover:-translate-y-px active:translate-y-0 transition-all bg-transparent">Kreiraj</button>
        </div>

        <div class="bg-surface-raised border border-white/[0.06] rounded-lg p-5 flex-1 flex flex-col items-stretch gap-3 shadow-md hover:border-brand/40 hover:shadow-lg transition-all">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded flex items-center justify-center bg-white/[0.08] text-brand flex-shrink-0">
                    <img src="./assets/icon-link.svg" class="w-4 h-4" />
                </div>
                <span class="font-bold text-sm text-content">Pridruži se</span>
            </div>
            <div class="h-px bg-white/[0.06] -mx-5"></div>
            <input type="text" id="gameIdInput" placeholder="Unesi kod..." class="menu-input w-full bg-surface border border-dim focus:border-brand rounded text-sm font-medium text-content placeholder-content-muted py-2.5 px-3 text-center focus:outline-none transition-colors tracking-widest uppercase">
            <button id="joinGame" class="menu-button w-full py-2.5 px-4 rounded text-sm font-semibold bg-brand hover:bg-brand-hover active:bg-brand-active text-white hover:-translate-y-px active:translate-y-0 transition-all border-0">Uđi</button>
        </div>

    </div>

    <p class="trade-mark absolute bottom-4 text-xs opacity-40 font-bold uppercase tracking-widest text-content-muted">
        2025 copyright &copy; Slagalica
    </p>

</main>
