        <span class="inline-flex items-center gap-1.5 px-3 py-0.5 rounded-full bg-white/[0.08] text-[#80848e] text-[11px] font-semibold uppercase tracking-wider">
            <span class="w-1.5 h-1.5 rounded-full bg-[#23a55a] inline-block"></span>

    <button id="randomGame" class="menu-button w-full max-w-md bg-[#5865f2] hover:bg-[#4752c4] active:bg-[#3c45a5] rounded-lg px-5 py-3.5 flex items-center justify-start gap-4 shadow-[0_4px_14px_rgba(88,101,242,0.35)] hover:shadow-[0_6px_20px_rgba(88,101,242,0.5)] hover:-translate-y-px active:translate-y-0 transition-all mb-5 group relative overflow-hidden border-0">

        </div>
        <div class="text-left">

        <div class="bg-[#2b2d31] border border-white/[0.06] rounded-lg p-5 flex-1 flex flex-col items-stretch gap-3 shadow-md hover:border-[#5865f2]/40 hover:shadow-lg transition-all">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded flex items-center justify-center bg-white/[0.08] text-[#5865f2] flex-shrink-0">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
