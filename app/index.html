<!DOCTYPE html>
<html lang="en">
<head>
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('user-theme') || 'dark');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slagalica</title>
    <script src="https://kit.fontawesome.com/aef9bef605.js" crossorigin="anonymous"></script>
    <script type="module" src="./src/Main.ts"></script>
    <link rel="icon" href="./assets/owl_logo.png">
</head>
<body class="flex flex-col h-screen bg-surface">
    <header id="gameHeader"></header>
    <div id="gameContainer" class="flex-1 flex flex-col"></div>


<div id="modalOverlay" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50">
    <div id="modalDialog" class="bg-surface-overlay rounded-lg shadow-overlay max-w-md w-full mx-4 border border-white/[0.06] overflow-hidden">

        <div class="bg-surface-raised px-6 py-4 border-b border-white/[0.06]">
            <h2 id="modalTitle" class="text-base font-bold text-white uppercase tracking-wider">Title</h2>
        </div>

        <div class="px-6 py-5">

            <div id="modalLoadingAnimation" class="flex items-center justify-center gap-1.5 mb-4 hidden">
                <span class="w-2 h-2 bg-brand rounded-full animate-bounce"></span>
                <span class="w-2 h-2 bg-brand rounded-full animate-bounce [animation-delay:150ms]"></span>
                <span class="w-2 h-2 bg-brand rounded-full animate-bounce [animation-delay:300ms]"></span>
            </div>

            <p id="modalText" class="text-content-subtle text-sm font-medium leading-relaxed mb-4">Description text goes here.</p>

            <div id="modalSolution" class="hidden mb-6 px-4 py-3 rounded-lg bg-surface-raised border border-white/[0.06]">
                <span data-i18n="solution_label" class="block text-xs uppercase tracking-wider text-content-muted mb-1">Rešenje</span>
                <span id="modalSolutionText" class="text-white font-semibold text-sm"></span>
            </div>

            <div class="flex items-center justify-end gap-3 pt-4 border-t border-white/[0.06]">

                <button id="modalPrimary" class="px-5 py-2.5 text-sm font-semibold text-content  bg-transparent hover:bg-white/[0.08] active:bg-white/[0.12] rounded transition-colors uppercase tracking-wide">
                    Zatvori
                </button>

                <button id="modalSecondary" class="px-5 py-2.5 text-sm font-semibold text-white bg-brand hover:bg-brand-hover active:bg-brand-active rounded hover:-translate-y-px active:translate-y-0 transition-all uppercase tracking-wide shadow-brand-sm">
                    Zatvori
                </button>

            </div>
        </div>
    </div>
</div>

<audio autoplay loop muted id="baseSoundtrack">
    <source src="./public/assets/sounds/base-soundtrack.mp3">
</audio>
</body>
</html>
