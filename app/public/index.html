<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slagalica</title>
    <script src="https://kit.fontawesome.com/aef9bef605.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.min.js" integrity="sha512-8ExARjWWkIllMlNzVg7JKq9RKWPlJABQUNq6YvAjE/HobctjH/NA+bSiDMDvouBVjp4Wwnf1VP1OEv7Zgjtuxw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script defer type="module" src="./src/Main.js"></script>
    <link rel="stylesheet" href="./output.css">
    <link rel="icon" href="./assets/owl_logo.png">
</head>
<body class=" bg-slate-200">
    <header id="gameHeader"></header>
    <section id="gameContainer"></section>

    <!-- Partials -->
    <div id="modalOverlay" class="cursor-pointer hidden fixed inset-0 bg-gray-900/30 backdrop-blur-sm flex items-center justify-center z-50">
        <div id="modalDialog" class="bg-white rounded-xl shadow-2xl max-w-md w-full mx-4 border-gray-300 overflow-hidden">
            <div class="p-8 text-center">
                <h2 id="modalTitle" class="text-2xl font-black text-gray-800 mb-4 uppercase tracking-tight">Title</h2>
                <div id="modalLoadingAnimation" class="flex items-center justify-center gap-2 mb-1 hidden">

                    <span class="w-3 h-3 bg-blue-500 rounded-full animate-bounce"></span>
                    <span class="w-3 h-3 bg-blue-500 rounded-full animate-bounce [animation-delay:150ms]"></span>
                    <span class="w-3 h-3 bg-blue-500 rounded-full animate-bounce [animation-delay:300ms]"></span>

                </div>
                <p id="modalText" class="text-gray-600 mb-8 font-medium">Description text goes here.</p>
                
                <div class="flex items-center gap-4">
                    <button id="modalPrimary" class="w-full py-3 bg-orange-400 text-white font-black rounded-xl shadow-lg border-b-4 border-[#b36b12] active:border-b-0 active:translate-y-1 transition-all uppercase">
                        Zatvori
                    </button>
    
                    <button id="modalSecondary" class="w-full py-3 bg-orange-400 text-white font-black rounded-xl shadow-lg border-b-4 border-[#b36b12] active:border-b-0 active:translate-y-1 transition-all uppercase">
                        Zatvori
                    </button>

                </div>
            </div>
        </div>

    </div>
</body>
</html>
