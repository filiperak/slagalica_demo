<main id="mojBrojMain" class="bg-surface flex flex-col items-center pt-6 pb-10 px-4 h-full">
    <div class="w-full flex-1 flex flex-col max-w-2xl mx-auto">

        <h2 class="text-center text-lg font-bold text-content tracking-wide mb-6" data-i18n="title">Moj Broj</h2>

        <div class="flex flex-col gap-6 flex-1 justify-center">

            <!-- Target number -->
            <div class="flex justify-center">
                <div id="targetNumber" class="text-5xl font-bold text-brand tracking-widest min-w-[140px] text-center py-3 px-6 bg-surface-raised border border-border-strong rounded-xl">
                    ?
                </div>
            </div>

            <!-- Expression display -->
            <div class="w-full">
                <div id="expressionDisplay" class="min-h-[44px] flex items-center justify-center text-xl font-semibold text-content flex-wrap gap-1 px-4">
                </div>
                <div class="mt-2 h-px bg-border-default"></div>
            </div>

            <!-- Number rows -->
            <div class="flex flex-col gap-3">
                <div id="firstRow" class="flex flex-wrap justify-center gap-2"></div>
                <div id="secondRow" class="flex flex-wrap justify-center gap-2"></div>
            </div>

            <!-- Operators + delete -->
            <div class="flex items-center justify-center gap-2 flex-wrap">
                <div id="operatorBtns" class="flex gap-2 flex-wrap justify-center"></div>
                <button id="deleteBtn" class="w-12 h-12 flex items-center justify-center bg-surface-raised border border-border-default hover:border-negative/50 hover:bg-negative/10 rounded-lg text-content-muted hover:text-negative transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 5H9l-7 7 7 7h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2z"/>
                        <line x1="18" y1="9" x2="12" y2="15"/>
                        <line x1="12" y1="9" x2="18" y2="15"/>
                    </svg>
                </button>
            </div>

            <!-- Actions -->
            <div class="flex flex-col gap-2 w-full">
                <button id="stopBtn" class="w-full py-3 bg-surface-raised border border-border-default hover:border-border-strong hover:bg-surface-overlay text-content text-sm font-semibold rounded-lg transition-all hover:-translate-y-px active:translate-y-0 tracking-wide" data-i18n="stop">
                    Stop
                </button>
                <button id="submitBtn" class="hidden w-full py-3 bg-brand hover:bg-brand-hover active:bg-brand-active text-content-on-brand text-sm font-semibold rounded-lg transition-all hover:-translate-y-px active:translate-y-0 tracking-wide shadow-brand-sm" data-i18n="submit">
                    Potvrdi
                </button>
            </div>

        </div>
    </div>
</main>
