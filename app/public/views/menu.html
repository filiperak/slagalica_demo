<main class="bg-[#1e1f22] min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-4xl mx-auto">

        <!-- Player name headers -->
        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="bg-[#2b2d31] border border-white/[0.06] rounded-lg shadow-md">

                </div>
            </div>
            <div class="bg-[#2b2d31] border border-white/[0.06] rounded-lg shadow-md">

                    <h2 id="p1-name" class="text-lg font-bold text-[#5865f2] truncate">Igrač 2</h2>
                </div>
            </div>
        </div>

        <!-- Game rows -->
        <div class="space-y-2 mb-6">

            <div class="grid grid-cols-[1fr_5rem_5rem] gap-2 items-center">
                <div data-game="slagalica" id="slagalica" class="game-btn bg-[#2b2d31] border border-white/[0.06] hover:border-[#5865f2]/50 hover:bg-[#313338] rounded-lg transition-all cursor-pointer active:scale-[0.98] group">
                    <div class="px-4 py-3">
                        <h3 class="text-sm font-semibold text-[#dbdee1] group-hover:text-white transition-colors">Slagalica</h3>
                    </div>
                </div>
                <div class="bg-[#2b2d31] border border-white/[0.06] rounded-lg">
                    <div class="py-3 text-center">
                        <span id="p0-slagalica" class="text-lg font-bold text-[#dbdee1]">0</span>
                    </div>
                </div>
                <div class="bg-[#2b2d31] border border-white/[0.06] rounded-lg">

            <div class="grid grid-cols-[1fr_5rem_5rem] gap-2 items-center">

                    <div class="px-4 py-3">
                        <h3 class="text-sm font-semibold text-[#dbdee1] group-hover:text-white transition-colors">Spojnice</h3>
                    </div>
                </div>
                <div class="bg-[#2b2d31] border border-white/[0.06] rounded-lg">
                    <div class="py-3 text-center">

                    </div>
                </div>
                <div class="bg-[#2b2d31] border border-white/[0.06] rounded-lg">

            <div class="grid grid-cols-[1fr_5rem_5rem] gap-2 items-center">

                    <div class="px-4 py-3">

                    </div>
                </div>
                <div class="bg-[#2b2d31] border border-white/[0.06] rounded-lg">

                    <p class="text-[#80848e] text-[10px] uppercase font-bold tracking-widest mb-1">Ukupno</p>

                Napusti igru
            </button>
        </div>

    </div>
</main>
